<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomeBite Premium - Menu</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;0,800;1,600&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* === VARIABLES & RESET === */
        :root {
            --primary-color: #e28743; 
            --secondary-color: #f4c150;
            --dark-bg: #050505; 
            --card-bg: rgba(21, 21, 21, 0.92);
            --item-bg: rgba(255, 255, 255, 0.03);
            --border-light: rgba(255, 255, 255, 0.1);
            --text-light: #ffffff;
            --text-muted: #a0a0a0;
            --success: #2ed573;
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Poppins', sans-serif; 
            background: linear-gradient(rgba(5, 5, 5, 0.85), rgba(5, 5, 5, 0.95)), 
                        url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') center/cover no-repeat fixed;
            color: var(--text-light);
            min-height: 100vh;
            padding-bottom: 60px;
        }

        /* === FIXED HEADER & LIVE PRICE BAR === */
        header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(5, 5, 5, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-light);
        }

        .navbar {
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { 
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem; 
            font-weight: 800; 
            color: var(--text-light); 
            text-decoration: none; 
            letter-spacing: 1px;
        }
        .logo span { color: var(--primary-color); font-style: italic; }

        /* Fixed Cart Stats Inside Header (Upra Ka Price Bar) */
        .fixed-cart-counter {
            display: flex;
            align-items: center;
            gap: 20px;
            background: rgba(226, 135, 67, 0.15);
            border: 1px solid var(--primary-color);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 0.95rem;
            font-weight: 500;
            transition: var(--transition);
        }
        
        .cart-stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .cart-stat-item i {
            color: var(--secondary-color);
        }

        .stat-val {
            font-weight: 700;
            color: var(--text-light);
        }

        .view-cart-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: var(--transition);
        }
        .view-cart-btn:hover {
            background: white;
            color: var(--primary-color);
            transform: scale(1.05);
        }

        /* === MENU CONTAINER === */
        .menu-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 5%;
        }

        .page-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .page-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }
        
        .page-subtitle {
            color: var(--text-muted);
            font-size: 1rem;
        }

        /* === MENU GRID === */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }

        .menu-card {
            background: var(--card-bg);
            border: 1px solid var(--border-light);
            border-radius: 16px;
            overflow: hidden;
            backdrop-filter: blur(10px);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            position: relative;
        }
        
        .menu-card:hover {
            transform: translateY(-5px);
            border-color: rgba(226, 135, 67, 0.4);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }

        .img-container {
            width: 100%;
            height: 200px;
            overflow: hidden;
            position: relative;
        }

        .menu-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition);
        }
        
        .menu-card:hover .menu-img {
            transform: scale(1.08);
        }

        .rating-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(5, 5, 5, 0.8);
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--secondary-color);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .card-body {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .item-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--text-light);
        }

        .item-chef {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 12px;
            font-style: italic;
        }

        .item-desc {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.5;
            margin-bottom: 20px;
            flex: 1;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 15px;
        }

        .item-price {
            font-size: 1.3rem;
            color: var(--primary-color);
            font-weight: 700;
        }

        /* Add to Cart Button Styling */
        .add-to-cart-btn {
            background: transparent;
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            padding: 10px 18px;
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .add-to-cart-btn:hover {
            background: var(--primary-color);
            color: white;
            box-shadow: 0 5px 15px rgba(226, 135, 67, 0.3);
        }

        /* Pulse Animation when item is added */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); border-color: var(--secondary-color); }
            100% { transform: scale(1); }
        }
        .pulse-effect {
            animation: pulse 0.4s ease-in-out;
        }

        /* === RESPONSIVE LAYOUT === */
        @media (max-width: 768px) {
            .navbar { flex-direction: column; gap: 15px; text-align: center; }
            .fixed-cart-counter { width: 100%; justify-content: center; }
            .page-title { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="navbar">
            <a href="#" class="logo">Home<span>Bite</span>.</a>
            
            <div class="fixed-cart-counter" id="fixedCartBar">
                <div class="cart-stat-item">
                    <i class="fa-solid fa-utensils"></i>
                    Items: <span class="stat-val" id="topItemCount">0</span>
                </div>
                <div class="cart-stat-item">
                    <i class="fa-solid fa-indian-rupee-sign"></i>
                    Total: <span class="stat-val" id="topTotalPrice">0.00</span>
                </div>
                <a href="cart.html" class="view-cart-btn">
                    View Cart <i class="fa-solid fa-arrow-right"></i>
                </a>
            </div>
        </div>
    </header>

    <div class="menu-container">
        <div class="page-header">
            <h1 class="page-title">Our Premium Menu</h1>
            <p class="page-subtitle">Freshly cooked home-style luxury delicacies delivered straight to your door.</p>
        </div>

        <div class="menu-grid" id="menuGridContainer">
            </div>
    </div>

    <script>
        // 1. Menu Items Data Array (Aapki cart.html ke items se matching items rakhe hain)
        const menuProducts = [
            {
                id: "item1",
                title: "Authentic Chicken Biryani",
                chef: "By Chef Sharma",
                price: 250,
                rating: "4.9",
                desc: "Fragrant long-grain basmati rice layered with juicy marinated chicken, exotic premium spices, and saffron cooked in pure dum style.",
                img: "https://images.unsplash.com/photo-1589302168068-964664d93cb0?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=80"
            },
            {
                id: "item2",
                title: "Special Paneer Butter Masala",
                chef: "By Aunty Ki Rasoi",
                price: 180,
                rating: "4.8",
                desc: "Fresh soft cottage cheese cubes simmered rich, creamy, and mildly sweet tomato-onion gravy loaded with fresh butter and cream.",
                img: "https://images.unsplash.com/photo-1585937421612-70a008356fbe?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=80"
            },
            {
                id: "item3",
                title: "Tandoori Paneer Tikka",
                chef: "By Chef Sharma",
                price: 220,
                rating: "4.7",
                desc: "Paneer cubes marinated in rich spiced yogurt mixture, skewered with bell peppers and onions, grilled to smoky perfection.",
                img: "https://images.unsplash.com/photo-1567188040759-fb8a883dc6d8?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=80"
            },
            {
                id: "item4",
                title: "Dal Makhani with Laccha Paratha",
                chef: "By Punjabi Rasoi",
                price: 200,
                rating: "4.9",
                desc: "Slow-cooked black lentils cooked overnight with cream and butter, served with a layered flaky crispy whole-wheat Laccha Paratha.",
                img: "https://images.unsplash.com/photo-1546833999-b9f581a1996d?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=80"
            }
        ];

        // 2. LocalStorage se Cart load karne ka function
        let cart = JSON.parse(localStorage.getItem('homebite_cart')) || [];

        // 3. Menu Grid ko render karne ka function
        function renderMenuGrid() {
            const container = document.getElementById('menuGridContainer');
            container.innerHTML = ""; // Clear existing data
            
            menuProducts.forEach(product => {
                const cardHTML = `
                    <div class="menu-card">
                        <div class="img-container">
                            <span class="rating-badge"><i class="fa-solid fa-star"></i> ${product.rating}</span>
                            <img src="${product.img}" alt="${product.title}" class="menu-img">
                        </div>
                        <div class="card-body">
                            <h3 class="item-title">${product.title}</h3>
                            <p class="item-chef">${product.chef}</p>
                            <p class="item-desc">${product.desc}</p>
                            <div class="card-footer">
                                <span class="item-price">₹${product.price}</span>
                                <button class="add-to-cart-btn" onclick="addItemToCart('${product.id}')">
                                    <i class="fa-solid fa-cart-plus"></i> Add to Cart
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += cardHTML;
            });
        }

        // 4. Live Fixed Top Bar ko update karne ka logic
        function updateFixedCartBar() {
            let totalItemsCount = 0;
            let totalCartPrice = 0;

            cart.forEach(item => {
                totalItemsCount += item.qty;
                totalCartPrice += (item.price * item.qty);
            });

            // Dom values update karne ka logic
            document.getElementById('topItemCount').innerText = totalItemsCount;
            document.getElementById('topTotalPrice').innerText = totalCartPrice.toFixed(2);

            // Top Bar pe dynamic subtle pop look validation click par
            const bar = document.getElementById('fixedCartBar');
            bar.classList.add('pulse-effect');
            setTimeout(() => {
                bar.classList.remove('pulse-effect');
            }, 400);
        }

        // 5. Add to Cart Click Handler (Jitna click utna badhega logic)
        function addItemToCart(productId) {
            // Find item from menu array
            const targetProduct = menuProducts.find(p => p.id === productId);
            
            if (!targetProduct) return;

            // Check if item already exists in local cart
            const existingItem = cart.find(item => item.id === productId);

            if (existingItem) {
                // Agar item pehle se hai to quantity badhao
                existingItem.qty += 1;
            } else {
                // Agar item naya hai to create karke push karo
                cart.push({
                    id: targetProduct.id,
                    title: targetProduct.title,
                    chef: targetProduct.chef,
                    price: targetProduct.price,
                    img: targetProduct.img,
                    qty: 1
                });
            }

            // LocalStorage me save karein
            localStorage.setItem('homebite_cart', JSON.stringify(cart));

            // Fixed Top price bar live update karein
            updateFixedCartBar();
        }

        // Initial loading window setup
        window.onload = function() {
            renderMenuGrid();
            updateFixedCartBar();
        };
    </script>
</body>
</html>
