<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomeBite | Your Premium Box</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;0,800;1,600&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-color: #e28743; 
            --secondary-color: #f4c150;
            --dark-bg: #050505; 
            --section-bg: #0a0a0a; 
            --card-bg: #151515;
            --input-bg: #1a1a1a;
            --text-light: #ffffff;
            --text-muted: #a0a0a0;
            --danger: #ff4757;
            --success: #2ed573;
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        h1, h2, h3, h4, .brand-logo { font-family: 'Playfair Display', serif; }
        a { text-decoration: none; color: inherit; }

        /* === NAVBAR === */
        header {
            background: rgba(5, 5, 5, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .brand-logo { font-size: 1.8rem; font-weight: 800; color: var(--text-light); letter-spacing: 1px; }
        .brand-logo span { color: var(--primary-color); font-style: italic; }
        
        .back-menu-btn {
            font-size: 0.9rem;
            color: var(--text-muted);
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .back-menu-btn:hover { color: var(--primary-color); }

        /* === MAIN CART CONTAINER === */
        .cart-wrapper {
            max-width: 1200px;
            width: 100%;
            margin: 30px auto;
            padding: 0 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* === ADDRESS TOP BANNER === */
        .address-banner {
            background: linear-gradient(135deg, var(--section-bg) 0%, var(--card-bg) 100%);
            border: 1px solid rgba(226, 135, 67, 0.15);
            border-radius: 12px;
            padding: 20px 25px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .address-icon {
            background: rgba(226, 135, 67, 0.1);
            color: var(--primary-color);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            flex-shrink: 0;
        }
        .address-details h4 {
            font-family: 'Poppins', sans-serif;
            font-size: 1.05rem;
            color: var(--secondary-color);
            margin-bottom: 4px;
            font-weight: 600;
        }
        .address-details p {
            font-size: 0.9rem;
            color: var(--text-light);
            line-height: 1.4;
        }
        .address-details .user-contact {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* === TWO COLUMN CONTENT === */
        .cart-content {
            display: grid;
            grid-template-columns: 1.6fr 1fr;
            gap: 30px;
            align-items: start;
        }

        /* LEFT SIDE: ITEMS SECTION */
        .items-section h3 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
        }
        .cart-items-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .cart-item {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.03);
            border-radius: 12px;
            padding: 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            transition: var(--transition);
        }
        .cart-item:hover {
            border-color: rgba(226, 135, 67, 0.2);
        }
        .item-main-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .item-img {
            width: 75px;
            height: 75px;
            border-radius: 10px;
            object-fit: cover;
            background: #222;
        }
        .item-text h4 {
            font-family: 'Poppins', sans-serif;
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--text-light);
            margin-bottom: 3px;
        }
        .item-text p {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 6px;
        }
        .item-price {
            color: var(--primary-color);
            font-weight: 600;
            font-size: 1.05rem;
        }

        /* CONTROLS (QUANTITY & DELETE) */
        .item-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .quantity-picker {
            background: #0d0d0d;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px;
            display: flex;
            align-items: center;
            overflow: hidden;
        }
        .qty-btn {
            background: transparent;
            border: none;
            color: var(--text-light);
            width: 32px;
            height: 32px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: var(--transition);
        }
        .qty-btn:hover { background: rgba(226, 135, 67, 0.2); color: var(--primary-color); }
        .qty-value {
            width: 30px;
            text-align: center;
            font-size: 0.9rem;
            font-weight: 600;
        }
        .delete-btn {
            background: rgba(255, 71, 87, 0.1);
            border: none;
            color: var(--danger);
            width: 32px;
            height: 32px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }
        .delete-btn:hover { background: var(--danger); color: white; }

        /* RIGHT SIDE: ORDER SUMMARY */
        .summary-card {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.03);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }
        .summary-card h3 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 12px;
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 15px;
        }
        .summary-row.total {
            border-top: 1px dashed rgba(255,255,255,0.1);
            padding-top: 15px;
            font-size: 1.15rem;
            color: var(--text-light);
            font-weight: 700;
            margin-top: 5px;
            margin-bottom: 25px;
        }
        .summary-row.total .total-price {
            color: var(--primary-color);
        }

        /* PAYMENT METHOD */
        .payment-section {
            margin-bottom: 25px;
        }
        .payment-title {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text-light);
        }
        .payment-option {
            background: #0d0d0d;
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 8px;
            padding: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: var(--transition);
        }
        .payment-option:hover {
            border-color: rgba(226, 135, 67, 0.3);
        }
        .payment-option input[type="radio"] {
            accent-color: var(--primary-color);
            width: 16px;
            height: 16px;
        }
        .payment-option label {
            cursor: pointer;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
        }

        /* CHECKOUT BUTTON */
        .checkout-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: var(--transition);
        }
        .checkout-btn:hover {
            background: #c97130;
            box-shadow: 0 5px 15px rgba(226, 135, 67, 0.3);
        }

        /* Empty Cart State */
        .empty-cart-message {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
            font-size: 1rem;
        }

        /* === RESPONSIVE FIXES === */
        @media (max-width: 991px) {
            .cart-content { grid-template-columns: 1fr; }
            header { padding: 20px 30px; }
        }
    </style>
</head>
<body>

    <header>
        <a href="/" class="brand-logo">Home<span>Bite</span>.</a>
        <a href="/menu" class="back-menu-btn"><i class="fas fa-arrow-left"></i> Back to Menu</a>
    </header>

    <main class="cart-wrapper">
        
        <div class="address-banner" id="addressBanner">
            <div class="address-icon">
                <i class="fas fa-map-marker-alt"></i>
            </div>
            <div class="address-details">
                <h4>Delivery Address</h4>
                <p id="userAddressDisplay">Fetching your delivery address...</p>
                <p id="userContactDisplay" class="user-contact"></p>
            </div>
        </div>

        <div class="cart-content">
            
            <section class="items-section">
                <h3>Your Premium Box</h3>
                <div class="cart-items-list" id="cartItemsList">
                    </div>
            </section>

            <aside class="summary-card">
                <h3>Order Summary</h3>
                
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span id="subtotalVal">₹0.00</span>
                </div>
                <div class="summary-row">
                    <span>Delivery Fee</span>
                    <span id="deliveryVal">₹40.00</span>
                </div>
                <div class="summary-row">
                    <span>Taxes (5%)</span>
                    <span id="taxVal">₹0.00</span>
                </div>
                
                <div class="summary-row total">
                    <span>Total Amount</span>
                    <span id="totalVal" class="total-price">₹0.00</span>
                </div>

                <div class="payment-section">
                    <div class="payment-title">Select Payment Method</div>
                    
                    <div class="payment-option">
                        <input type="radio" id="payOnline" name="paymentMethod" value="online" checked>
                        <label for="payOnline">
                            <i class="fas fa-credit-card" style="color: var(--primary-color);"></i>
                            Pay Online (UPI, Card, NetBanking)
                        </label>
                    </div>

                    <div class="payment-option">
                        <input type="radio" id="payCod" name="paymentMethod" value="cod">
                        <label for="payCod">
                            <i class="fas fa-money-bill-wave" style="color: var(--success);"></i>
                            Cash on Delivery (COD)
                        </label>
                    </div>
                </div>

                <button class="checkout-btn" onclick="processOrderCheckout()">Proceed to Checkout</button>
            </aside>

        </div>
    </main>

    <script>
        // Server Base URL 
        const SERVER_URL = 'https://homebite-aecl.onrender.com';

        // Sample initial cart items array matching your screens for standalone display
        let cartItems = [
            { id: "item1", title: "Authentic Chicken Biryani", author: "Chef Sharma", price: 250, qty: 1, img: "https://images.unsplash.com/photo-1563379091339-03b21ab4a4f8?auto=format&fit=crop&w=150&q=80" },
            { id: "item2", title: "Special Paneer Butter Masala", author: "Aunty Ki Rasoi", price: 180, qty: 2, img: "https://images.unsplash.com/photo-1631452180519-c014fe946bc7?auto=format&fit=crop&w=150&q=80" }
        ];

        // Fetch user data from your live render instance on startup
        async function fetchUserProfileData() {
            try {
                // If token exists in localStorage, append it to verify auth state
                const token = localStorage.getItem('token'); 
                const headers = {};
                if(token) headers['Authorization'] = `Bearer ${token}`;

                const response = await fetch(`${SERVER_URL}/api/users/profile`, { method: 'GET', headers: headers });
                
                if (response.ok) {
                    const userData = await response.json();
                    // Inject database content securely into address layout
                    document.getElementById('userAddressDisplay').innerText = `${userData.fullName} — ${userData.address || 'No Address Saved'}`;
                    if(userData.phoneNumber || userData.email) {
                        document.getElementById('userContactDisplay').innerText = `Contact: ${userData.phoneNumber || ''} | ${userData.email}`;
                    }
                } else {
                    // Fallback configuration if auth fails or run locally
                    document.getElementById('userAddressDisplay').innerText = "SONAM Kumari — badalpur, Patna, Bihar, India";
                    document.getElementById('userContactDisplay').innerText = "Contact: +91 96938 14964 | 7258sonam@gmail.com";
                }
            } catch (err) {
                console.error("Failed to sync user context via API:", err);
                // Fallback rendering
                document.getElementById('userAddressDisplay').innerText = "SONAM Kumari — badalpur, Patna, Bihar, India";
                document.getElementById('userContactDisplay').innerText = "Contact: +91 96938 14964 | 7258sonam@gmail.com";
            }
        }

        // Render Cart HTML lists
        function renderCartItems() {
            const listContainer = document.getElementById('cartItemsList');
            if (cartItems.length === 0) {
                listContainer.innerHTML = `<div class="empty-cart-message">Your Premium Box is empty! Grab delicious items from Menu.</div>`;
                calculatePricingTotals();
                return;
            }

            listContainer.innerHTML = cartItems.map((item, index) => `
                <div class="cart-item" data-id="${item.id}">
                    <div class="item-main-info">
                        <img src="${item.img}" alt="${item.title}" class="item-img">
                        <div class="item-text">
                            <h4>${item.title}</h4>
                            <p>By ${item.author}</p>
                            <div class="item-price">₹${item.price}</div>
                        </div>
                    </div>
                    <div class="item-controls">
                        <div class="quantity-picker">
                            <button class="qty-btn" onclick="updateQty(${index}, -1)">−</button>
                            <span class="qty-value">${item.qty}</span>
                            <button class="qty-btn" onclick="updateQty(${index}, 1)">+</button>
                        </div>
                        <button class="delete-btn" onclick="removeCartItem(${index})">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </div>
                </div>
            `).join('');

            calculatePricingTotals();
        }

        // Update quantity trigger
        function updateQty(index, offset) {
            cartItems[index].qty += offset;
            if (cartItems[index].qty <= 0) {
                removeCartItem(index);
            } else {
                renderCartItems();
            }
        }

        // Remove single row structure
        function removeCartItem(index) {
            cartItems.splice(index, 1);
            renderCartItems();
        }

        // Real-time computations (Subtotal, Taxes, Total)
        function calculatePricingTotals() {
            let subtotal = 0;
            cartItems.forEach(item => {
                subtotal += (item.price * item.qty);
            });

            const deliveryFee = subtotal > 0 ? 40 : 0;
            const taxAmount = subtotal * 0.05;
            const totalAmount = subtotal + deliveryFee + taxAmount;

            document.getElementById('subtotalVal').innerText = `₹${subtotal.toFixed(2)}`;
            document.getElementById('deliveryVal').innerText = `₹${deliveryFee.toFixed(2)}`;
            document.getElementById('taxVal').innerText = `₹${taxAmount.toFixed(2)}`;
            document.getElementById('totalVal').innerText = `₹${totalAmount.toFixed(2)}`;
        }

        // Handle order placement pipeline
        function processOrderCheckout() {
            if(cartItems.length === 0) {
                return; 
            }
            
            const selectedPayment = document.querySelector('input[name="paymentMethod"]:checked').value;
            const targetAddress = document.getElementById('userAddressDisplay').innerText;

            const orderPayload = {
                items: cartItems,
                deliveryAddress: targetAddress,
                paymentMethod: selectedPayment,
                timestamp: new Date()
            };

            console.log("Submitting dynamic payload structure onto Kitchen Dashboard Node:", orderPayload);
            
            // Redirect smoothly without browser system alert interrupts
            window.location.href = "/live-orders.html";
        }

        // Init routine initialization
        window.addEventListener('DOMContentLoaded', () => {
            fetchUserProfileData();
            renderCartItems();
        });
    </script>
</body>
</html>
