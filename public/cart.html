<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="/js/auth-guard.js"></script>
    <title>HomeBite Premium - Your Cart</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;0,800;1,600&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* === VARIABLES & RESET === */
        :root {
            --primary-color: #e28743; 
            --secondary-color: #f4c150;
            --dark-bg: #050505; 
            --card-bg: rgba(21, 21, 21, 0.92);
            --item-bg: rgba(255, 255, 255, 0.03);
            --border-light: rgba(255, 255, 255, 0.1);
            --text-light: #ffffff;
            --text-muted: #a0a0a0;
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Poppins', sans-serif; 
            background: linear-gradient(rgba(5, 5, 5, 0.85), rgba(5, 5, 5, 0.95)), 
                        url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') center/cover no-repeat fixed;
            color: var(--text-light);
            min-height: 100vh;
            padding-bottom: 50px;
        }

        /* === NAVBAR === */
        header {
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-light);
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo { 
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem; 
            font-weight: 800; 
            color: var(--text-light); 
            text-decoration: none; 
            letter-spacing: 1px;
        }
        .logo span { color: var(--primary-color); font-style: italic; }
        
        .back-btn {
            color: var(--text-light);
            text-decoration: none;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
        }
        .back-btn:hover { color: var(--primary-color); }

        /* === CART CONTAINER === */
        .cart-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 5%;
        }

        .page-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            margin-bottom: 30px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        .cart-wrapper {
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }

        /* Left Side: Cart Items */
        .cart-items {
            flex: 2;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .cart-item {
            display: flex;
            align-items: center;
            background: var(--card-bg);
            border: 1px solid var(--border-light);
            border-radius: 12px;
            padding: 20px;
            gap: 20px;
            backdrop-filter: blur(10px);
            position: relative;
        }

        .item-img {
            width: 100px;
            height: 100px;
            border-radius: 10px;
            object-fit: cover;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .item-details { flex: 1; }
        .item-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 5px; }
        .item-chef { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 10px; }
        .item-price { font-size: 1.1rem; color: var(--primary-color); font-weight: 600; }

        /* Quantity Controls */
        .quantity-control {
            display: flex;
            align-items: center;
            gap: 15px;
            background: var(--item-bg);
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid var(--border-light);
        }
        .qty-btn {
            background: transparent;
            border: none;
            color: var(--text-light);
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
        }
        .qty-btn:hover { color: var(--primary-color); }
        .qty-val { font-weight: 600; font-size: 1rem; width: 20px; text-align: center; }

        /* Remove Button */
        .remove-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 50, 50, 0.1);
            color: #ff4d4d;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .remove-btn:hover { background: #ff4d4d; color: white; transform: scale(1.1); }

        /* Right Side: Order Summary */
        .cart-summary {
            flex: 1;
            background: var(--card-bg);
            border: 1px solid var(--border-light);
            border-radius: 16px;
            padding: 30px;
            backdrop-filter: blur(10px);
            position: sticky;
            top: 100px;
        }

        .summary-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            margin-bottom: 25px;
            border-bottom: 1px solid var(--border-light);
            padding-bottom: 15px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 0.95rem;
            color: var(--text-muted);
        }
        .summary-row.total {
            font-size: 1.2rem;
            color: var(--text-light);
            font-weight: 600;
            border-top: 1px dashed var(--border-light);
            padding-top: 15px;
            margin-top: 10px;
        }
        .summary-row.total span:last-child { color: var(--primary-color); }

        /* PAYMENT METHODS */
        .payment-methods {
            margin-top: 25px;
            border-top: 1px solid var(--border-light);
            padding-top: 20px;
        }
        .payment-title {
            font-size: 1.1rem;
            margin-bottom: 15px;
            color: var(--text-light);
            font-weight: 600;
        }
        .payment-option {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 0.95rem;
            transition: var(--transition);
            background: var(--item-bg);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid transparent;
        }
        .payment-option:hover {
            border-color: var(--border-light);
            color: var(--text-light);
        }
        .payment-option input[type="radio"] {
            accent-color: var(--primary-color);
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        .payment-option i {
            color: var(--primary-color);
            font-size: 1.2rem;
            width: 25px;
            text-align: center;
        }

        .checkout-btn {
            width: 100%;
            padding: 16px;
            border: 1px solid var(--primary-color);
            background: var(--primary-color);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 8px 20px rgba(226, 135, 67, 0.2);
            margin-top: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .checkout-btn:hover {
            background: transparent;
            color: var(--primary-color);
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(226, 135, 67, 0.4);
        }

        /* === RESPONSIVE === */
        @media (max-width: 900px) {
            .cart-wrapper { flex-direction: column; }
            .cart-summary { width: 100%; position: static; }
        }

        @media (max-width: 600px) {
            .cart-item { flex-direction: column; text-align: center; position: relative; padding-top: 40px; }
            .quantity-control { justify-content: center; width: 100%; margin-top: 10px; }
            .remove-btn { top: 15px; right: 15px; }
            .item-img { width: 100%; height: 150px; }
        }
    </style>
</head>
<body>

    <header>
        <a href="/home" class="logo">Home<span>Bite</span>.</a>
        <a href="/menu" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back to Menu</a>
    </header>

    <div class="cart-container">
        <h1 class="page-title">Your Premium Box</h1>

        <div class="cart-wrapper">
            
            <div class="cart-items" id="cart-items-container">
                </div>

            <div class="cart-summary">
                <h3 class="summary-title">Order Summary</h3>
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span>₹<span id="subtotal">0</span></span>
                </div>
                <div class="summary-row">
                    <span>Delivery Fee</span>
                    <span>₹<span id="delivery">0</span></span>
                </div>
                <div class="summary-row">
                    <span>Taxes (5%)</span>
                    <span>₹<span id="tax">0</span></span>
                </div>
                <div class="summary-row total">
                    <span>Total Amount</span>
                    <span>₹<span id="totalAmt">0</span></span>
                </div>

                <div class="payment-methods">
                    <h4 class="payment-title">Select Payment Method</h4>
                    
                    <label class="payment-option">
                        <input type="radio" name="payment_method" value="online" checked>
                        <i class="fa-solid fa-credit-card"></i> Pay Online (UPI, Card, NetBanking)
                    </label>
                    
                    <label class="payment-option">
                        <input type="radio" name="payment_method" value="cod">
                        <i class="fa-solid fa-money-bill-wave"></i> Cash on Delivery (COD)
                    </label>
                </div>

                <button class="checkout-btn" onclick="checkout()">Proceed to Checkout</button>
            </div>

        </div>
    </div>

    <script>
        // Sahi Key 'homebite_cart' ka use kiya gaya hai ab
        let cart = JSON.parse(localStorage.getItem('homebite_cart')) || [];

        // DOM Elements
        const cartContainer = document.getElementById('cart-items-container');

        // Function to render cart items dynamically
        function renderCart() {
            cartContainer.innerHTML = ''; // Clear container first

            if (cart.length === 0) {
                cartContainer.innerHTML = '<p style="text-align:center; color: var(--text-muted); padding: 50px;">Your premium box is empty. Go back to the Menu to add some delicious food!</p>';
                calculateTotal();
                return;
            }

            cart.forEach((item, index) => {
                const itemHTML = `
                    <div class="cart-item" id="item-${index}">
                        <button class="remove-btn" onclick="removeItem(${index})"><i class="fa-solid fa-trash"></i></button>
                        <img src="${item.img || item.image || 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=80'}" alt="${item.title}" class="item-img">
                        <div class="item-details">
                            <h3 class="item-title">${item.title || 'Delicious Meal'}</h3>
                            <p class="item-chef">${item.chef || 'HomeBite Special'}</p>
                            <p class="item-price">₹<span class="price-val">${item.price}</span></p>
                        </div>
                        <div class="quantity-control">
                            <button class="qty-btn" onclick="updateQty(${index}, -1)"><i class="fa-solid fa-minus"></i></button>
                            <span class="qty-val">${item.qty || 1}</span>
                            <button class="qty-btn" onclick="updateQty(${index}, 1)"><i class="fa-solid fa-plus"></i></button>
                        </div>
                    </div>
                `;
                cartContainer.innerHTML += itemHTML;
            });

            calculateTotal();
        }

        // Total calculate karne ka function
        function calculateTotal() {
            let subtotal = 0;
            
            cart.forEach(item => {
                subtotal += (parseFloat(item.price) * parseInt(item.qty || 1));
            });

            const delivery = subtotal > 0 ? 40 : 0; 
            const tax = subtotal * 0.05;
            const total = subtotal + delivery + tax;

            document.getElementById('subtotal').innerText = subtotal.toFixed(2);
            document.getElementById('delivery').innerText = delivery;
            document.getElementById('tax').innerText = tax.toFixed(2);
            document.getElementById('totalAmt').innerText = total.toFixed(2);
        }

        // Quantity Update logic
        function updateQty(index, change) {
            let newQty = (cart[index].qty || 1) + change;
            if(newQty >= 1) { 
                cart[index].qty = newQty;
                localStorage.setItem('homebite_cart', JSON.stringify(cart)); // Sahi key me update
                renderCart(); // Re-render HTML
            }
        }

        // Item Remove logic
        function removeItem(index) {
            const itemElement = document.getElementById(`item-${index}`);
            itemElement.style.opacity = '0'; // Smooth hide animation
            
            setTimeout(() => {
                cart.splice(index, 1); // Array se delete karo
                localStorage.setItem('homebite_cart', JSON.stringify(cart)); // Sahi key me save
                renderCart(); // UI refresh karo
            }, 300);
        }

        // Checkout Button Click
        function checkout() {
            if (cart.length === 0) {
                alert("Your cart is empty! Please add some meals from the menu.");
                return;
            }

            const total = document.getElementById('totalAmt').innerText;
            const paymentMethod = document.querySelector('input[name="payment_method"]:checked').value;

            if (paymentMethod === 'online') {
                alert("Redirecting to secure online payment gateway. Total amount to pay: ₹" + total);
                // Redirect logic yahan dalna: window.location.href = 'payment.html';
            } else if (paymentMethod === 'cod') {
                alert("Order Placed Successfully via Cash on Delivery! Total amount to pay at door: ₹" + total);
                // Redirect logic yahan dalna: window.location.href = 'success.html';
                
                // Clear cart after successful COD order
                localStorage.removeItem('homebite_cart');
                cart = [];
                renderCart();
            }
        }

        // Initial render jab page load ho
        window.onload = renderCart;
    </script>
</body>
</html>
