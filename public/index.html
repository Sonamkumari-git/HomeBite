<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="/js/guest-guard.js"></script>
    <title>HomeBite Premium - Login & Sign Up</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;0,800;1,600&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* === VARIABLES & RESET (PREMIUM DARK THEME) === */
        :root {
            --primary-color: #e28743; 
            --secondary-color: #f4c150;
            --dark-bg: #050505; 
            --card-bg: rgba(21, 21, 21, 0.92); /* Classy semi-transparent dark */
            --input-bg: rgba(255, 255, 255, 0.03);
            --border-light: rgba(255, 255, 255, 0.1);
            --text-light: #ffffff;
            --text-muted: #a0a0a0;
            --transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Poppins', sans-serif; 
            /* Luxury Dark Food Texture Background with Tint Overlay */
            background: linear-gradient(rgba(5, 5, 5, 0.82), rgba(5, 5, 5, 0.92)), 
                        url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') center/cover no-repeat fixed;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px; 
            color: var(--text-light);
        }

        /* === AUTH CONTAINER === */
        .auth-container {
            background: var(--card-bg);
            backdrop-filter: blur(15px); /* Smooth premium blur effect */
            -webkit-backdrop-filter: blur(15px);
            border-radius: 16px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), 0 0 40px rgba(226, 135, 67, 0.05);
            border: 1px solid rgba(255,255,255,0.07);
            display: flex;
            max-width: 1050px;
            width: 100%;
            overflow: hidden;
            position: relative;
            min-height: 650px;
        }

        /* Left Side - Image */
        .auth-image {
            flex: 1.2;
            background: url('https://images.unsplash.com/photo-1543339308-43e59d6b73a6?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80') center/cover no-repeat;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 50px 40px;
            color: white;
        }
        .auth-image::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, rgba(5,5,5,0.95) 0%, rgba(5,5,5,0.4) 50%, rgba(5,5,5,0.1) 100%);
        }
        .auth-image-content { position: relative; z-index: 1; }
        .auth-image h2 { 
            font-family: 'Playfair Display', serif; 
            font-size: 3rem; 
            font-weight: 700; 
            margin-bottom: 15px; 
            line-height: 1.1; 
            text-shadow: 2px 4px 15px rgba(0,0,0,0.8);
        }
        .auth-image p { 
            font-size: 1.05rem; 
            color: var(--text-muted); 
            line-height: 1.6;
        }

        /* Right Side - Form Area */
        .auth-form-area {
            flex: 1;
            padding: 60px 50px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Logo */
        .logo { 
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem; 
            font-weight: 800; 
            color: var(--text-light); 
            text-decoration: none; 
            text-align: center; 
            margin-bottom: 40px; 
            display: block; 
            letter-spacing: 1px;
        }
        .logo span { color: var(--primary-color); font-style: italic; }

        /* Toggle Button */
        .auth-toggle { 
            display: flex; 
            background: rgba(255,255,255,0.03); 
            border-radius: 50px; 
            margin-bottom: 40px; 
            position: relative; 
            border: 1px solid var(--border-light);
            padding: 4px;
        }
        .toggle-btn { 
            flex: 1; 
            padding: 12px; 
            text-align: center; 
            cursor: pointer; 
            font-weight: 500; 
            color: var(--text-muted); 
            transition: var(--transition); 
            z-index: 1; 
            border: none; 
            background: transparent; 
            font-size: 0.95rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .toggle-btn.active { color: #fff; font-weight: 600; }
        .toggle-slider { 
            position: absolute; 
            top: 4px; 
            left: 4px; 
            width: calc(50% - 4px); 
            height: calc(100% - 8px); 
            background: var(--primary-color); 
            border-radius: 50px; 
            transition: 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); 
            box-shadow: 0 4px 15px rgba(226, 135, 67, 0.3); 
        }

        /* Forms */
        .form-section { display: none; animation: fadeIn 0.5s ease; }
        .form-section.active { display: block; }
        
        .input-group { margin-bottom: 25px; }
        .input-group label { 
            display: block; 
            font-size: 0.85rem; 
            font-weight: 400; 
            color: var(--text-muted); 
            margin-bottom: 10px; 
            letter-spacing: 0.5px;
        }
        .input-group input { 
            width: 100%; 
            padding: 15px 20px; 
            border: 1px solid var(--border-light); 
            border-radius: 8px; 
            font-size: 1rem; 
            outline: none; 
            transition: var(--transition); 
            background: var(--input-bg); 
            color: var(--text-light);
            font-family: 'Poppins', sans-serif;
        }
        .input-group input::placeholder { color: #666; }
        .input-group input:focus { 
            border-color: var(--primary-color); 
            background: rgba(255,255,255,0.06); 
            box-shadow: 0 0 15px rgba(226, 135, 67, 0.15); 
        }

        /* Submit Button */
        .submit-btn { 
            width: 100%; 
            padding: 16px; 
            border: 1px solid var(--primary-color); 
            background: var(--primary-color); 
            color: white; 
            font-size: 1rem; 
            font-weight: 600; 
            border-radius: 8px; 
            cursor: pointer; 
            transition: var(--transition); 
            box-shadow: 0 8px 20px rgba(226, 135, 67, 0.2); 
            margin-top: 15px; 
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: 'Poppins', sans-serif;
        }
        .submit-btn:hover { 
            background: transparent;
            color: var(--primary-color);
            transform: translateY(-3px); 
            box-shadow: 0 12px 25px rgba(226, 135, 67, 0.4); 
        }

        .forgot-pass { 
            text-align: right; 
            display: block; 
            font-size: 0.85rem; 
            color: var(--text-muted); 
            text-decoration: none; 
            margin-top: -10px; 
            margin-bottom: 25px; 
            transition: var(--transition);
        }
        .forgot-pass:hover { color: var(--primary-color); }

        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        /* Responsive */
        @media (max-width: 900px) {
            .auth-container { flex-direction: column; max-width: 500px; background: rgba(15, 15, 15, 0.96); }
            .auth-image { min-height: 250px; flex: none; padding: 30px; }
            .auth-image h2 { font-size: 2.2rem; }
            .auth-form-area { padding: 40px 30px; }
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-image">
            <div class="auth-image-content">
                <h2>Craving Ghar ka Khana?</h2>
                <p>Join Patna's most premium home-chef network and get fresh, healthy meals delivered directly to your doorstep.</p>
            </div>
        </div>

        <div class="auth-form-area">
            <a href="index.html" class="logo">Home<span>Bite</span>.</a>

            <div class="auth-toggle">
                <div class="toggle-slider" id="toggleSlider"></div>
                <button class="toggle-btn active" onclick="switchTab('login')">Login</button>
                <button class="toggle-btn" onclick="switchTab('signup')">Sign Up</button>
            </div>

            <form id="loginForm" class="form-section active">
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="Enter your email" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" placeholder="Enter your password" required>
                </div>
                <a href="#" class="forgot-pass">Forgot Password?</a>
                <button type="submit" class="submit-btn">Login to HomeBite</button>
            </form>

            <form id="signupForm" class="form-section">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" placeholder="e.g. Rahul Kumar" required>
                </div>
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="e.g. rahul@example.com" required>
                </div>
                <div class="input-group">
                    <label>Hostel / Room Address</label>
                    <input type="text" placeholder="e.g. Room 102, Shivam Hostel" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" placeholder="Create a strong password" required>
                </div>
                <button type="submit" class="submit-btn">Create Account</button>
            </form>
        </div>
    </div>

    <script>
        // 1. Tab Change Karne Ka Logic
        function switchTab(tab) {
            const loginForm = document.getElementById('loginForm');
            const signupForm = document.getElementById('signupForm');
            const slider = document.getElementById('toggleSlider');
            const btns = document.querySelectorAll('.toggle-btn');

            if (tab === 'login') {
                loginForm.classList.add('active');
                signupForm.classList.remove('active');
                slider.style.left = '4px';
                btns[0].classList.add('active');
                btns[1].classList.remove('active');
            } else {
                signupForm.classList.add('active');
                loginForm.classList.remove('active');
                slider.style.left = 'calc(50% + 2px)';
                btns[1].classList.add('active');
                btns[0].classList.remove('active');
            }
        }

        // 2. Sign Up Form Submit Karne Ka Logic
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault(); 

            const fullName = e.target[0].value;
            const email = e.target[1].value;
            const address = e.target[2].value;
            const password = e.target[3].value;

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fullName, email, address, password })
                });

                const data = await response.json();

                if (response.ok) {
                    alert('Account successfully created! Ab aap login kar sakte hain.');
                    e.target.reset(); // Form clear kar do
                    switchTab('login'); // Login page par shift kar do
                } else {
                    alert('Error: ' + data.message); 
                }
            } catch (error) {
                console.error(error);
                alert('Server se connect nahi ho paya! Kripya check karein server on hai ya nahi.');
            }
        });

        // 3. Login Form Submit Karne Ka Logic
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = e.target[0].value;
            const password = e.target[1].value;

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // ==========================================
                    // YAHAN MAINE TOKEN SAVE KARNE KA CODE ADD KIYA HAI
                    // ==========================================
                    if (data.token) {
                        localStorage.setItem('token', data.token);
                    }
                    
                    alert('Login Successful! Welcome to HomeBite, ' + (data.fullName || ""));
                    window.location.href = 'home.html';
                } else {
                    alert('Error: ' + data.message); 
                }
            } catch (error) {
                console.error(error);
                alert('Server error!');
            }
        });
    </script>
</body>
</html>
