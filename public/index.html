<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomeBite - Login & Sign Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #fdfbf7; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        
        :root {
            --primary: #ff6b00;
            --secondary: #ff3c00;
            --dark: #121212;
            --light-bg: #fff5eb;
            --border: #eaeaea;
        }

        .auth-container {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            display: flex;
            max-width: 1000px;
            width: 100%;
            overflow: hidden;
            position: relative;
            min-height: 600px;
        }

        /* Left Side - Image */
        .auth-image {
            flex: 1;
            background: url('https://images.unsplash.com/photo-1543339308-43e59d6b73a6?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80') center/cover no-repeat;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 40px;
            color: white;
        }
        .auth-image::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.8), rgba(0,0,0,0.1));
        }
        .auth-image-content { position: relative; z-index: 1; }
        .auth-image h2 { font-size: 2.5rem; font-weight: 800; margin-bottom: 10px; line-height: 1.2; }
        .auth-image p { font-size: 1rem; color: #f0f0f0; }

        /* Right Side - Form Area */
        .auth-form-area {
            flex: 1;
            padding: 50px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .logo { font-size: 28px; font-weight: 800; color: var(--dark); text-decoration: none; text-align: center; margin-bottom: 30px; display: block; }
        .logo span { color: var(--primary); }

        .auth-toggle { display: flex; background: var(--light-bg); border-radius: 50px; margin-bottom: 30px; position: relative; }
        .toggle-btn { flex: 1; padding: 12px; text-align: center; cursor: pointer; font-weight: 600; color: #666; transition: 0.3s; z-index: 1; border: none; background: transparent; font-size: 1rem;}
        .toggle-btn.active { color: white; }
        .toggle-slider { position: absolute; top: 0; left: 0; width: 50%; height: 100%; background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: 50px; transition: 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); box-shadow: 0 4px 15px rgba(255, 107, 0, 0.3); }

        /* Forms */
        .form-section { display: none; animation: fadeIn 0.5s ease; }
        .form-section.active { display: block; }
        
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 0.85rem; font-weight: 600; color: #555; margin-bottom: 8px; }
        .input-group input { width: 100%; padding: 12px 15px; border: 1px solid var(--border); border-radius: 12px; font-size: 0.95rem; outline: none; transition: 0.3s; background: #fafafa; }
        .input-group input:focus { border-color: var(--primary); background: white; box-shadow: 0 0 0 4px rgba(255, 107, 0, 0.1); }

        .submit-btn { width: 100%; padding: 14px; border: none; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; font-size: 1rem; font-weight: 700; border-radius: 12px; cursor: pointer; transition: 0.3s; box-shadow: 0 8px 20px rgba(255, 107, 0, 0.25); margin-top: 10px; }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 25px rgba(255, 107, 0, 0.35); }

        .forgot-pass { text-align: right; display: block; font-size: 0.85rem; color: var(--primary); text-decoration: none; margin-top: -10px; margin-bottom: 20px; font-weight: 500; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Responsive */
        @media (max-width: 768px) {
            .auth-container { flex-direction: column; }
            .auth-image { min-height: 250px; flex: none; }
            .auth-form-area { padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-image">
            <div class="auth-image-content">
                <h2>Craving Ghar ka Khana?</h2>
                <p>Join Patna's largest home-chef network and get fresh, healthy meals delivered to your hostel.</p>
            </div>
        </div>

        <div class="auth-form-area">
            <a href="index.html" class="logo">Home<span>Bite</span></a>

            <div class="auth-toggle">
                <div class="toggle-slider" id="toggleSlider"></div>
                <button class="toggle-btn active" onclick="switchTab('login')">Login</button>
                <button class="toggle-btn" onclick="switchTab('signup')">Sign Up</button>
            </div>

            <form id="loginForm" class="form-section active">
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="Enter your email" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" placeholder="Enter your password" required>
                </div>
                <a href="#" class="forgot-pass">Forgot Password?</a>
                <button type="submit" class="submit-btn">Login to HomeBite</button>
            </form>

            <form id="signupForm" class="form-section">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" placeholder="e.g. Rahul Kumar" required>
                </div>
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="e.g. rahul@example.com" required>
                </div>
                <div class="input-group">
                    <label>Hostel / Room Address</label>
                    <input type="text" placeholder="e.g. Room 102, Shivam Hostel, Boring Road" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" placeholder="Create a strong password" required>
                </div>
                <button type="submit" class="submit-btn">Create Account</button>
            </form>
        </div>
    </div>

    <script>
        // 1. Tab Change Karne Ka Logic
        function switchTab(tab) {
            const loginForm = document.getElementById('loginForm');
            const signupForm = document.getElementById('signupForm');
            const slider = document.getElementById('toggleSlider');
            const btns = document.querySelectorAll('.toggle-btn');

            if (tab === 'login') {
                loginForm.classList.add('active');
                signupForm.classList.remove('active');
                slider.style.left = '0';
                btns[0].classList.add('active');
                btns[1].classList.remove('active');
            } else {
                signupForm.classList.add('active');
                loginForm.classList.remove('active');
                slider.style.left = '50%';
                btns[1].classList.add('active');
                btns[0].classList.remove('active');
            }
        }

        // 2. Sign Up Form Submit Karne Ka Logic
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault(); 

            const fullName = e.target[0].value;
            const email = e.target[1].value;
            const address = e.target[2].value;
            const password = e.target[3].value;

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fullName, email, address, password })
                });

                const data = await response.json();

                if (response.ok) {
                    alert('Account successfully created! Ab aap login kar sakte hain.');
                    e.target.reset(); // Form clear kar do
                    switchTab('login'); // Login page par shift kar do
                } else {
                    alert('Error: ' + data.message); 
                }
            } catch (error) {
                console.error(error);
                alert('Server se connect nahi ho paya! Kripya check karein server on hai ya nahi.');
            }
        });

        // 3. Login Form Submit Karne Ka Logic
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = e.target[0].value;
            const password = e.target[1].value;

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    alert('Login Successful! Welcome to HomeBite, ' + data.fullName);
                    
                    // 👉 YAHAN MAINE CHANGE KIYA HAI: Login ke baad home.html par bhej dega
                    window.location.href = 'home.html';
                    
                } else {
                    alert('Error: ' + data.message); 
                }
            } catch (error) {
                console.error(error);
                alert('Server error!');
            }
        });
    </script>
</body>
</html>
