<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="/js/auth-guard.js"></script>
    <title>HomeBite Premium - My Profile</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;0,800;1,600&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* === VARIABLES & RESET === */
        :root {
            --primary-color: #e28743; 
            --secondary-color: #f4c150;
            --dark-bg: #050505; 
            --card-bg: rgba(21, 21, 21, 0.92);
            --item-bg: rgba(255, 255, 255, 0.03);
            --border-light: rgba(255, 255, 255, 0.1);
            --text-light: #ffffff;
            --text-muted: #a0a0a0;
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Poppins', sans-serif; 
            background: linear-gradient(rgba(5, 5, 5, 0.85), rgba(5, 5, 5, 0.95)), 
                        url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') center/cover no-repeat fixed;
            color: var(--text-light);
            min-height: 100vh;
            padding-bottom: 50px;
        }

        /* === NAVBAR === */
        header {
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-light);
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo { 
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem; 
            font-weight: 800; 
            color: var(--text-light); 
            text-decoration: none; 
            letter-spacing: 1px;
        }
        .logo span { color: var(--primary-color); font-style: italic; }
        
        .back-btn {
            color: var(--text-light);
            text-decoration: none;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
        }
        .back-btn:hover { color: var(--primary-color); }

        /* === PROFILE DASHBOARD CONTAINER === */
        .dashboard-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 5%;
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }

        /* === LEFT SIDEBAR === */
        .sidebar {
            flex: 1;
            background: var(--card-bg);
            border: 1px solid var(--border-light);
            border-radius: 16px;
            padding: 30px 20px;
            backdrop-filter: blur(10px);
            position: sticky;
            top: 100px;
            text-align: center;
        }

        .profile-pic-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 20px auto;
            border-radius: 50%;
            border: 3px solid var(--primary-color);
            overflow: hidden;
            cursor: pointer;
        }
        .profile-pic {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition);
        }
        .pic-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: var(--transition);
            color: white;
            font-size: 1.5rem;
        }
        .profile-pic-container:hover .pic-overlay { opacity: 1; }
        .profile-pic-container:hover .profile-pic { transform: scale(1.1); }
        #fileInput { display: none; }

        .user-name { font-family: 'Playfair Display', serif; font-size: 1.5rem; margin-bottom: 5px; }
        .user-email { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 30px; }

        .nav-list { list-style: none; text-align: left; }
        .nav-list li { margin-bottom: 10px; }
        .nav-list button {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-light);
            padding: 12px 15px;
            text-align: left;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 12px;
            font-family: 'Poppins', sans-serif;
        }
        .nav-list button i { width: 20px; text-align: center; color: var(--text-muted); }
        .nav-list button:hover { background: var(--item-bg); color: var(--primary-color); }
        .nav-list button:hover i { color: var(--primary-color); }
        .nav-list button.active { background: rgba(226, 135, 67, 0.1); color: var(--primary-color); border-left: 3px solid var(--primary-color); }
        .nav-list button.active i { color: var(--primary-color); }
        .nav-list .logout-btn:hover { color: #ff4d4d; }
        .nav-list .logout-btn:hover i { color: #ff4d4d; }

        /* === MAIN CONTENT AREA === */
        .main-content {
            flex: 2.5;
            background: var(--card-bg);
            border: 1px solid var(--border-light);
            border-radius: 16px;
            padding: 40px;
            backdrop-filter: blur(10px);
            min-height: 500px;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-light);
            padding-bottom: 15px;
        }

        .tab-content { display: none; animation: fadeIn 0.4s ease; }
        .tab-content.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 8px; }
        .input-group input, .input-group textarea {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--border-light);
            border-radius: 8px;
            background: var(--item-bg);
            color: var(--text-light);
            font-family: 'Poppins', sans-serif;
            outline: none;
            transition: var(--transition);
        }
        .input-group input:focus, .input-group textarea:focus { border-color: var(--primary-color); background: rgba(255,255,255,0.06); }
        .row { display: flex; gap: 20px; }
        .row .input-group { flex: 1; }

        .btn-primary {
            padding: 14px 25px;
            border: none;
            background: var(--primary-color);
            color: white;
            font-size: 1rem;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 10px;
        }
        .btn-primary:hover { background: #d17835; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(226,135,67,0.3); }

        .order-card { border: 1px solid var(--border-light); border-radius: 12px; padding: 20px; margin-bottom: 20px; background: var(--item-bg); }
        .order-header { display: flex; justify-content: space-between; margin-bottom: 15px; border-bottom: 1px dashed var(--border-light); padding-bottom: 10px; }
        .order-id { font-weight: 600; color: var(--primary-color); }
        .order-date { color: var(--text-muted); font-size: 0.9rem; }
        .order-items { font-size: 0.95rem; line-height: 1.6; margin-bottom: 10px; }
        .order-footer { display: flex; justify-content: space-between; align-items: center; }
        .order-total { font-weight: 600; font-size: 1.1rem; }
        .status { padding: 5px 12px; border-radius: 50px; font-size: 0.8rem; font-weight: 500; }
        .status.delivered { background: rgba(46, 204, 113, 0.1); color: #2ecc71; border: 1px solid rgba(46, 204, 113, 0.3); }
        .status.transit { background: rgba(244, 193, 80, 0.1); color: var(--secondary-color); border: 1px solid rgba(244, 193, 80, 0.3); }

        .address-card { border: 1px solid var(--border-light); border-radius: 12px; padding: 20px; margin-bottom: 20px; background: var(--item-bg); position: relative; }
        .address-type { background: var(--primary-color); color: white; padding: 4px 10px; border-radius: 4px; font-size: 0.75rem; font-weight: 600; display: inline-block; margin-bottom: 10px; }
        .address-text { color: var(--text-muted); line-height: 1.5; font-size: 0.95rem; margin-bottom: 15px; }
        .address-actions button { background: transparent; border: none; color: var(--text-light); cursor: pointer; margin-right: 15px; font-size: 0.9rem; transition: 0.3s; }
        .address-actions button:hover { color: var(--primary-color); }
        .address-actions button.delete:hover { color: #ff4d4d; }

        @media (max-width: 900px) {
            .dashboard-container { flex-direction: column; }
            .sidebar { width: 100%; position: static; }
            .row { flex-direction: column; gap: 0; }
        }
    </style>
</head>
<body>

    <header>
        <a href="/" class="logo">Home<span>Bite</span>.</a>
        <a href="/" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
    </header>

    <div class="dashboard-container">
        
        <aside class="sidebar">
            <div class="profile-pic-container" onclick="document.getElementById('fileInput').click();">
                <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=80" alt="Profile" class="profile-pic" id="profileImage">
                <div class="pic-overlay"><i class="fa-solid fa-camera"></i></div>
                <input type="file" id="fileInput" accept="image/*" onchange="previewAndUploadImage(event)">
            </div>
            
            <h3 class="user-name" id="display-name">Loading...</h3>
            <p class="user-email" id="display-email">Loading...</p>

            <ul class="nav-list">
                <li><button class="nav-btn active" onclick="openTab(event, 'profile-info')"><i class="fa-regular fa-user"></i> Profile Info</button></li>
                <li><button class="nav-btn" onclick="openTab(event, 'orders')"><i class="fa-solid fa-box-open"></i> Your Orders</button></li>
                <li><button class="nav-btn" onclick="openTab(event, 'addresses')"><i class="fa-solid fa-location-dot"></i> Saved Addresses</button></li>
                <li><button class="nav-btn" onclick="openTab(event, 'settings')"><i class="fa-solid fa-gear"></i> Settings</button></li>
                <li><button class="logout-btn" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</button></li>
            </ul>
        </aside>

        <main class="main-content">
            
            <div id="profile-info" class="tab-content active">
                <h2 class="section-title">Edit Profile Info</h2>
                <form onsubmit="saveProfile(event)">
                    <div class="row">
                        <div class="input-group">
                            <label>First Name</label>
                            <input type="text" id="input-fname" required>
                        </div>
                        <div class="input-group">
                            <label>Last Name</label>
                            <input type="text" id="input-lname" required>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Email Address</label>
                        <input type="email" id="input-email" required>
                    </div>
                    <div class="input-group">
                        <label>Address</label>
                        <input type="text" id="input-address" required>
                    </div>
                    <button type="submit" class="btn-primary">Save Changes</button>
                </form>
            </div>

            <div id="orders" class="tab-content">
                <h2 class="section-title">Order History</h2>
                <div class="order-card">
                    <div class="order-header">
                        <span class="order-id">Order #HB-98745</span>
                        <span class="order-date">24 Oct, 2023 | 08:30 PM</span>
                    </div>
                    <div class="order-items">
                        <p>1x Authentic Chicken Biryani</p>
                        <p>2x Butter Naan</p>
                    </div>
                    <div class="order-footer">
                        <span class="order-total">Total: ₹350</span>
                        <span class="status delivered">Delivered</span>
                    </div>
                </div>
            </div>

            <div id="addresses" class="tab-content">
                <h2 class="section-title">Manage Addresses</h2>
                <div class="address-card">
                    <span class="address-type">Default</span>
                    <p class="address-text" id="display-address">Loading Address...</p>
                    <div class="address-actions">
                        <button><i class="fa-solid fa-pen"></i> Edit</button>
                    </div>
                </div>
                <button class="btn-primary" style="margin-top: 0;"><i class="fa-solid fa-plus"></i> Add New Address</button>
            </div>

            <div id="settings" class="tab-content">
                <h2 class="section-title">Account Settings</h2>
                <h3 style="margin-bottom: 15px; font-size: 1.2rem;">Change Password</h3>
                <form onsubmit="changePassword(event)">
                    <div class="input-group">
                        <label>Current Password</label>
                        <input type="password" placeholder="Enter current password" required>
                    </div>
                    <div class="row">
                        <div class="input-group">
                            <label>New Password</label>
                            <input type="password" placeholder="New password" required>
                        </div>
                        <div class="input-group">
                            <label>Confirm New Password</label>
                            <input type="password" placeholder="Confirm password" required>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary">Update Password</button>
                </form>
            </div>

        </main>
    </div>

    <script>
        // === UI INTERACTION LOGIC ===
        function openTab(evt, tabName) {
            const tabContents = document.querySelectorAll('.tab-content');
            tabContents.forEach(tab => tab.classList.remove('active'));

            const navBtns = document.querySelectorAll('.nav-btn');
            navBtns.forEach(btn => btn.classList.remove('active'));

            document.getElementById(tabName).classList.add('active');
            evt.currentTarget.classList.add('active');
        }

        // === 🚀 FIXED: IMAGE UPLOAD TO CLOUDINARY LOGIC ===
        async function previewAndUploadImage(event) {
            const file = event.target.files[0];
            if (!file) return;

            // 1. Pehle local preview dikhao taaki user ko turant change dikhe
            const reader = new FileReader();
            reader.onload = function() {
                document.getElementById('profileImage').src = reader.result;
            };
            reader.readAsDataURL(file);

            // 2. Ab photo backend (Cloudinary) par bhejo
            const token = localStorage.getItem('token');
            const formData = new FormData();
            formData.append('profilePic', file); // 'profilePic' hi Multer dhoond raha hai

            try {
                // Uploading indicator (optional)
                document.getElementById('display-name').innerHTML = 'Uploading... <i class="fa-solid fa-spinner fa-spin"></i>';

                const response = await fetch('https://homebite-aecl.onrender.com/api/users/profile-pic', {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${token}` 
                        // Dhyan de: FormData bhejte time Content-Type set nahi karte!
                    },
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    alert("Profile photo updated and saved to server!");
                    // Ensure backend URL is used
                    if (data.profileImage) {
                        document.getElementById('profileImage').src = data.profileImage;
                    }
                    // Wapas naam theek karne ke liye API dobara call karte hain
                    fetchUserData(token); 
                } else {
                    alert("Upload failed: " + data.message);
                    fetchUserData(token); // Restore normal name
                }
            } catch (error) {
                console.error("Upload Error:", error);
                alert("Server error during image upload.");
                fetchUserData(token); // Restore normal name
            }
        }

        function saveProfile(e) {
            e.preventDefault();
            // TODO: PUT /api/users/profile call yahan lagani hai baad mein
            alert("Profile information saved successfully!");
        }

        function changePassword(e) {
            e.preventDefault();
            // TODO: PUT /api/users/change-password call yahan lagani hai baad mein
            alert("Password updated securely!");
            e.target.reset();
        }

        function logout() {
            if(confirm("Are you sure you want to log out?")) {
                localStorage.removeItem('token'); 
                window.location.href = "/login"; // Clean URL redirect
            }
        }

        // === 🚀 FIXED: BACKEND DATA FETCH LOGIC ===
        document.addEventListener("DOMContentLoaded", async () => {
            const token = localStorage.getItem('token');
            
            if (!token) {
                console.warn("No token found. User needs to login.");
                document.getElementById('display-name').textContent = "Please Login";
                document.getElementById('display-email').textContent = "Redirecting...";
                // Bina token seedha baahar phenkna
                window.location.href = "/login"; 
                return;
            }

            fetchUserData(token);
        });

        async function fetchUserData(token) {
            try {
                const response = await fetch('https://homebite-aecl.onrender.com/api/users/profile', {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}` 
                    }
                });

                if (response.ok) {
                    const userData = await response.json(); 
                    
                    // Sidebar Update
                    const userName = userData.name || userData.fullName || "User";
                    document.getElementById('display-name').textContent = userName;
                    document.getElementById('display-email').textContent = userData.email || "";

                    // PROFILE PIC UPDATE LOGIC
                    if (userData.profileImage) {
                        document.getElementById('profileImage').src = userData.profileImage;
                    }

                    // Form Update
                    const nameParts = userName.split(' ');
                    document.getElementById('input-fname').value = nameParts[0] || '';
                    document.getElementById('input-lname').value = nameParts.slice(1).join(' ') || '';
                    document.getElementById('input-email').value = userData.email || '';
                    
                    if(userData.address) {
                        document.getElementById('input-address').value = userData.address;
                        document.getElementById('display-address').textContent = userData.address;
                    }

                } else if (response.status === 401 || response.status === 403) {
                    alert("Session expired. Please login again.");
                    localStorage.removeItem('token');
                    window.location.href = "/login"; 
                } else {
                    console.warn("Could not fetch user data. Error code:", response.status);
                    document.getElementById('display-name').textContent = "Error Loading Profile";
                }
            } catch (error) {
                console.error("Error connecting to server:", error);
                document.getElementById('display-name').textContent = "Server Offline";
            }
        }
    </script>
</body>
</html>
