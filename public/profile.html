<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomeBite Premium - My Profile</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;0,800;1,600&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* === VARIABLES & RESET === */
        :root {
            --primary-color: #e28743; 
            --secondary-color: #f4c150;
            --dark-bg: #050505; 
            --card-bg: rgba(21, 21, 21, 0.92);
            --item-bg: rgba(255, 255, 255, 0.03);
            --border-light: rgba(255, 255, 255, 0.1);
            --text-light: #ffffff;
            --text-muted: #a0a0a0;
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Poppins', sans-serif; 
            background: linear-gradient(rgba(5, 5, 5, 0.85), rgba(5, 5, 5, 0.95)), 
                        url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') center/cover no-repeat fixed;
            color: var(--text-light);
            min-height: 100vh;
            padding-bottom: 50px;
        }

        /* === NAVBAR === */
        header {
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-light);
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo { 
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem; 
            font-weight: 800; 
            color: var(--text-light); 
            text-decoration: none; 
            letter-spacing: 1px;
        }
        .logo span { color: var(--primary-color); font-style: italic; }
        
        .back-btn {
            color: var(--text-light);
            text-decoration: none;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
        }
        .back-btn:hover { color: var(--primary-color); }

        /* === PROFILE DASHBOARD CONTAINER === */
        .dashboard-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 5%;
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }

        /* === LEFT SIDEBAR === */
        .sidebar {
            flex: 1;
            background: var(--card-bg);
            border: 1px solid var(--border-light);
            border-radius: 16px;
            padding: 30px 20px;
            backdrop-filter: blur(10px);
            position: sticky;
            top: 100px;
            text-align: center;
        }

        /* Profile Photo Setup */
        .profile-pic-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 20px auto;
            border-radius: 50%;
            border: 3px solid var(--primary-color);
            overflow: hidden;
            cursor: pointer;
        }
        .profile-pic {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition);
        }
        .pic-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: var(--transition);
            color: white;
            font-size: 1.5rem;
        }
        .profile-pic-container:hover .pic-overlay { opacity: 1; }
        .profile-pic-container:hover .profile-pic { transform: scale(1.1); }
        #fileInput { display: none; }

        .user-name { font-family: 'Playfair Display', serif; font-size: 1.5rem; margin-bottom: 5px; }
        .user-email { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 30px; }

        /* Sidebar Navigation */
        .nav-list { list-style: none; text-align: left; }
        .nav-list li { margin-bottom: 10px; }
        .nav-list button {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-light);
            padding: 12px 15px;
            text-align: left;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 12px;
            font-family: 'Poppins', sans-serif;
        }
        .nav-list button i { width: 20px; text-align: center; color: var(--text-muted); }
        .nav-list button:hover { background: var(--item-bg); color: var(--primary-color); }
        .nav-list button:hover i { color: var(--primary-color); }
        .nav-list button.active { background: rgba(226, 135, 67, 0.1); color: var(--primary-color); border-left: 3px solid var(--primary-color); }
        .nav-list button.active i { color: var(--primary-color); }
        .nav-list .logout-btn:hover { color: #ff4d4d; }
        .nav-list .logout-btn:hover i { color: #ff4d4d; }

        /* === MAIN CONTENT AREA === */
        .main-content {
            flex: 2.5;
            background: var(--card-bg);
            border: 1px solid var(--border-light);
            border-radius: 16px;
            padding: 40px;
            backdrop-filter: blur(10px);
            min-height: 500px;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-light);
            padding-bottom: 15px;
        }

        /* Tab Content Control */
        .tab-content { display: none; animation: fadeIn 0.4s ease; }
        .tab-content.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Common Forms */
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 8px; }
        .input-group input, .input-group textarea {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--border-light);
            border-radius: 8px;
            background: var(--item-bg);
            color: var(--text-light);
            font-family: 'Poppins', sans-serif;
            outline: none;
            transition: var(--transition);
        }
        .input-group input:focus, .input-group textarea:focus { border-color: var(--primary-color); background: rgba(255,255,255,0.06); }
        .row { display: flex; gap: 20px; }
        .row .input-group { flex: 1; }

        .btn-primary {
            padding: 14px 25px;
            border: none;
            background: var(--primary-color);
            color: white;
            font-size: 1rem;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 10px;
        }
        .btn-primary:hover { background: #d17835; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(226,135,67,0.3); }
        .btn-primary:disabled { background: var(--text-muted); cursor: not-allowed; }

        /* Orders & Address Styling (Unchanged CSS) */
        .order-card { border: 1px solid var(--border-light); border-radius: 12px; padding: 20px; margin-bottom: 20px; background: var(--item-bg); }
        .order-header { display: flex; justify-content: space-between; margin-bottom: 15px; border-bottom: 1px dashed var(--border-light); padding-bottom: 10px; }
        .order-id { font-weight: 600; color: var(--primary-color); }
        .order-date { color: var(--text-muted); font-size: 0.9rem; }
        .order-items { font-size: 0.95rem; line-height: 1.6; margin-bottom: 10px; }
        .order-footer { display: flex; justify-content: space-between; align-items: center; }
        .order-total { font-weight: 600; font-size: 1.1rem; }
        .status { padding: 5px 12px; border-radius: 50px; font-size: 0.8rem; font-weight: 500; }
        .status.delivered { background: rgba(46, 204, 113, 0.1); color: #2ecc71; border: 1px solid rgba(46, 204, 113, 0.3); }
        .status.transit { background: rgba(244, 193, 80, 0.1); color: var(--secondary-color); border: 1px solid rgba(244, 193, 80, 0.3); }

        .address-card { border: 1px solid var(--border-light); border-radius: 12px; padding: 20px; margin-bottom: 20px; background: var(--item-bg); position: relative; }
        .address-type { background: var(--primary-color); color: white; padding: 4px 10px; border-radius: 4px; font-size: 0.75rem; font-weight: 600; display: inline-block; margin-bottom: 10px; }
        .address-text { color: var(--text-muted); line-height: 1.5; font-size: 0.95rem; margin-bottom: 15px; }
        .address-actions button { background: transparent; border: none; color: var(--text-light); cursor: pointer; margin-right: 15px; font-size: 0.9rem; transition: 0.3s; }
        .address-actions button:hover { color: var(--primary-color); }
        .address-actions button.delete:hover { color: #ff4d4d; }

        .toggle-switch { display: flex; align-items: center; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid var(--border-light); }
        .toggle-switch label { font-size: 1rem; }
        .switch { position: relative; display: inline-block; width: 50px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(255,255,255,0.1); transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--primary-color); }
        input:checked + .slider:before { transform: translateX(26px); }

        @media (max-width: 900px) {
            .dashboard-container { flex-direction: column; }
            .sidebar { width: 100%; position: static; }
            .row { flex-direction: column; gap: 0; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">Home<span>Bite</span>.</a>
        <a href="home.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
    </header>

    <div class="dashboard-container">
        
        <aside class="sidebar">
            <div class="profile-pic-container" onclick="document.getElementById('fileInput').click();">
                <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=80" alt="Profile" class="profile-pic" id="profileImage">
                <div class="pic-overlay"><i class="fa-solid fa-camera"></i></div>
                <input type="file" id="fileInput" accept="image/*" onchange="previewImage(event)">
            </div>
            
            <h3 class="user-name" id="sidebarName">Loading...</h3>
            <p class="user-email" id="sidebarEmail">Loading...</p>

            <ul class="nav-list">
                <li><button class="nav-btn active" onclick="openTab(event, 'profile-info')"><i class="fa-regular fa-user"></i> Profile Info</button></li>
                <li><button class="nav-btn" onclick="openTab(event, 'orders')"><i class="fa-solid fa-box-open"></i> Your Orders</button></li>
                <li><button class="nav-btn" onclick="openTab(event, 'addresses')"><i class="fa-solid fa-location-dot"></i> Saved Addresses</button></li>
                <li><button class="nav-btn" onclick="openTab(event, 'settings')"><i class="fa-solid fa-gear"></i> Settings</button></li>
                <li><button class="logout-btn" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</button></li>
            </ul>
        </aside>

        <main class="main-content">
            
            <div id="profile-info" class="tab-content active">
                <h2 class="section-title">Edit Profile Info</h2>
                <form id="profileForm" onsubmit="saveProfile(event)">
                    <div class="row">
                        <div class="input-group">
                            <label>First Name</label>
                            <input type="text" id="firstName" required>
                        </div>
                        <div class="input-group">
                            <label>Last Name</label>
                            <input type="text" id="lastName" required>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Email Address</label>
                        <input type="email" id="email" readonly style="opacity: 0.7;"> 
                    </div>
                    <div class="input-group">
                        <label>Phone Number</label>
                        <input type="tel" id="phone" required>
                    </div>
                    <button type="submit" id="saveProfileBtn" class="btn-primary">Save Changes</button>
                </form>
            </div>

            <div id="orders" class="tab-content">
                <h2 class="section-title">Order History</h2>
                <p style="color: var(--text-muted);">Fetching your recent orders...</p>
                </div>

            <div id="addresses" class="tab-content">
                <h2 class="section-title">Manage Addresses</h2>
                <p style="color: var(--text-muted);">No addresses saved yet.</p>
                <button class="btn-primary" style="margin-top: 20px;"><i class="fa-solid fa-plus"></i> Add New Address</button>
            </div>

            <div id="settings" class="tab-content">
                <h2 class="section-title">Account Settings</h2>
                
                <h3 style="margin-bottom: 15px; font-size: 1.2rem;">Change Password</h3>
                <form onsubmit="changePassword(event)">
                    <div class="input-group">
                        <label>Current Password</label>
                        <input type="password" id="currentPassword" placeholder="Enter current password" required>
                    </div>
                    <div class="row">
                        <div class="input-group">
                            <label>New Password</label>
                            <input type="password" id="newPassword" placeholder="New password" required>
                        </div>
                        <div class="input-group">
                            <label>Confirm New Password</label>
                            <input type="password" id="confirmPassword" placeholder="Confirm password" required>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary">Update Password</button>
                </form>
            </div>

        </main>
    </div>

    <script>
        // ======= APKI BACKEND URL =======
        // IMPORTANT: Yahan apna backend url daaliye (e.g., https://your-app.onrender.com/api/users)
        // Agar locally run kar rahe hain toh shayad ye http://localhost:5000/api/users hoga
        const API_URL = 'http://localhost:5000/api/users'; 

        // Check if user is logged in (Token in localStorage)
        const token = localStorage.getItem('token');
        if (!token) {
            // Agar token nahi hai toh login page par bhej do
            window.location.href = "index.html";
        }

        // --- Fetch User Profile on Page Load ---
        async function fetchUserProfile() {
            try {
                const response = await fetch(`${API_URL}/profile`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                const data = await response.json();

                if (response.ok) {
                    // Update UI with database data
                    document.getElementById('sidebarName').innerText = `${data.firstName} ${data.lastName}`;
                    document.getElementById('sidebarEmail').innerText = data.email;
                    
                    if(data.profilePic) {
                        document.getElementById('profileImage').src = data.profilePic;
                    }

                    // Populate form fields
                    document.getElementById('firstName').value = data.firstName;
                    document.getElementById('lastName').value = data.lastName;
                    document.getElementById('email').value = data.email;
                    document.getElementById('phone').value = data.phone;
                } else {
                    alert('Session expired. Please login again.');
                    logout();
                }
            } catch (error) {
                console.error("Error fetching profile:", error);
            }
        }

        // Call fetch function immediately when page loads
        fetchUserProfile();

        // --- 1. Tab Switching Logic ---
        function openTab(evt, tabName) {
            const tabContents = document.querySelectorAll('.tab-content');
            tabContents.forEach(tab => tab.classList.remove('active'));

            const navBtns = document.querySelectorAll('.nav-btn');
            navBtns.forEach(btn => btn.classList.remove('active'));

            document.getElementById(tabName).classList.add('active');
            evt.currentTarget.classList.add('active');
        }

        // --- 2. Profile Image Upload (Cloudinary) Logic ---
        async function previewImage(event) {
            const file = event.target.files[0];
            if (!file) return;

            // Instant local preview dikhane ke liye
            const reader = new FileReader();
            reader.onload = function() {
                document.getElementById('profileImage').src = reader.result;
            };
            reader.readAsDataURL(file);

            // Backend (Cloudinary) par upload karne ka logic
            const formData = new FormData();
            formData.append("profilePic", file);

            try {
                const picOverlay = document.querySelector('.pic-overlay');
                picOverlay.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>'; 
                picOverlay.style.opacity = '1';

                const response = await fetch(`${API_URL}/profile-pic`, {
                    method: "PUT",
                    headers: {
                        "Authorization": `Bearer ${token}`
                    },
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    document.getElementById('profileImage').src = data.profilePic;
                    alert("Profile photo updated successfully!");
                } else {
                    alert(data.message || "Failed to upload photo");
                }
            } catch (error) {
                console.error("Error uploading image:", error);
                alert("Something went wrong during upload.");
            } finally {
                const picOverlay = document.querySelector('.pic-overlay');
                picOverlay.innerHTML = '<i class="fa-solid fa-camera"></i>';
                picOverlay.style.opacity = '';
            }
        }

        // --- 3. Save Profile Info ---
        async function saveProfile(e) {
            e.preventDefault();
            const btn = document.getElementById('saveProfileBtn');
            btn.innerText = "Saving...";
            btn.disabled = true;

            const updatedData = {
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                phone: document.getElementById('phone').value
            };

            try {
                const response = await fetch(`${API_URL}/profile`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(updatedData)
                });

                const data = await response.json();

                if (response.ok) {
                    alert("Profile updated successfully!");
                    // Update Sidebar name instantly
                    document.getElementById('sidebarName').innerText = `${data.firstName} ${data.lastName}`;
                } else {
                    alert(data.message || "Failed to update profile");
                }
            } catch (error) {
                console.error("Error updating profile:", error);
                alert("Error updating profile.");
            } finally {
                btn.innerText = "Save Changes";
                btn.disabled = false;
            }
        }

        // --- 4. Change Password ---
        async function changePassword(e) {
            e.preventDefault();
            
            const currentPassword = document.getElementById('currentPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if(newPassword !== confirmPassword) {
                return alert("New passwords do not match!");
            }

            try {
                const response = await fetch(`${API_URL}/change-password`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ currentPassword, newPassword })
                });

                const data = await response.json();

                if (response.ok) {
                    alert("Password updated securely!");
                    e.target.reset(); // clear form
                } else {
                    alert(data.message || "Failed to change password");
                }
            } catch (error) {
                console.error("Error changing password:", error);
                alert("Error changing password.");
            }
        }

        // --- 5. Logout ---
        function logout() {
            if(confirm("Are you sure you want to log out?")) {
                localStorage.removeItem('token'); // Token remove kar diya
                window.location.href = "index.html"; // Redirect to login
            }
        }
    </script>
</body>
</html>
