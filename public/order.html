<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomeBite | My Orders</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #e28743;
            --dark-bg: #050505;
            --card-bg: #151515;
            --text-light: #ffffff;
            --text-muted: #a0a0a0;
            --success: #2ed573;
            --info: #00d2d3;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body { background-color: var(--dark-bg); color: var(--text-light); padding: 20px; }

        .container { max-width: 800px; margin: 0 auto; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; }
        .header h1 { font-size: 1.8rem; color: var(--primary-color); }
        
        .refresh-btn {
            background: rgba(226, 135, 67, 0.1); border: 1px solid var(--primary-color);
            color: var(--primary-color); padding: 8px 15px; border-radius: 6px;
            cursor: pointer; transition: 0.3s; font-weight: 500;
        }
        .refresh-btn:hover { background: var(--primary-color); color: #fff; }

        .order-card {
            background: var(--card-bg); border-radius: 10px; padding: 20px;
            margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05);
        }

        .order-header { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .order-id { font-weight: 600; font-size: 1.1rem; }
        .order-date { color: var(--text-muted); font-size: 0.85rem; }

        .status-badge {
            padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; text-transform: uppercase;
        }
        .status-new { background: rgba(255, 255, 255, 0.1); color: #fff; }
        .status-accepted { background: rgba(0, 210, 211, 0.1); color: var(--info); }
        .status-preparing { background: rgba(244, 193, 80, 0.1); color: #f4c150; }
        .status-out_for_delivery { background: rgba(226, 135, 67, 0.1); color: var(--primary-color); }
        .status-delivered { background: rgba(46, 213, 115, 0.1); color: var(--success); }

        .items-list { color: var(--text-muted); font-size: 0.9rem; margin: 15px 0; padding-bottom: 15px; border-bottom: 1px dashed rgba(255,255,255,0.1); }
        .footer-details { display: flex; justify-content: space-between; align-items: center; }
        .price { font-size: 1.2rem; font-weight: 700; color: #fff; }
        .payment-mode { font-size: 0.85rem; color: var(--text-muted); }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>My Orders 🍔</h1>
            <button class="refresh-btn" onclick="fetchMyOrders()">
                <i class="fas fa-sync-alt"></i> Refresh Status
            </button>
        </div>

        <div id="orders-container">
            <p style="text-align:center; color: var(--text-muted);">Loading your delicious orders...</p>
        </div>
    </div>

    <script>
        // Yahan apna User Backend ka URL daalna
        const API_URL = 'http://localhost:5000/api/orders'; 
        
        // As a test, assume user phone is saved in localStorage. 
        // Agar tune login system nahi banaya abhi, toh dummy number se test kar lena.
        const userPhone = localStorage.getItem('userPhone') || prompt("Enter phone number to view orders:");
        
        if(userPhone) {
            localStorage.setItem('userPhone', userPhone);
            fetchMyOrders();
            // Tera auto-refresh wala idea: Har 10 sec mein khud refresh hoga
            setInterval(fetchMyOrders, 10000);
        } else {
            document.getElementById('orders-container').innerHTML = "<p>Please login to see orders.</p>";
        }

        async function fetchMyOrders() {
            try {
                const response = await fetch(`${API_URL}/my-orders/${userPhone}`);
                const result = await response.json();

                if (result.success) {
                    displayOrders(result.data);
                }
            } catch (error) {
                console.error("Error fetching orders:", error);
            }
        }

        function displayOrders(orders) {
            const container = document.getElementById('orders-container');
            container.innerHTML = '';

            if(orders.length === 0) {
                container.innerHTML = `<p style="text-align:center; color:#a0a0a0;">No orders found. Time to eat something tasty!</p>`;
                return;
            }

            orders.forEach(order => {
                let itemsHtml = order.items.map(i => `${i.qty}x ${i.title}`).join('<br>');
                let statusText = order.status.replace('_', ' '); // out_for_delivery ko Out for delivery banayega
                
                container.innerHTML += `
                    <div class="order-card">
                        <div class="order-header">
                            <div>
                                <div class="order-id">${order.orderId}</div>
                                <div class="order-date">${new Date(order.createdAt).toLocaleString()}</div>
                            </div>
                            <div>
                                <span class="status-badge status-${order.status}">${statusText}</span>
                            </div>
                        </div>
                        <div class="items-list">
                            ${itemsHtml}
                        </div>
                        <div class="footer-details">
                            <div class="payment-mode">
                                <i class="fas fa-wallet"></i> ${order.paymentMethod.toUpperCase()} 
                                (${order.paymentStatus})
                            </div>
                            <div class="price">₹${order.totalAmount}</div>
                        </div>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
